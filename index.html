<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello CI/CD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff; text-align: center;
        }
        .container { max-width: 600px; padding: 40px; }
        h1 { font-size: 3em; margin-bottom: 16px; letter-spacing: 2px; }
        p { font-size: 1.2em; opacity: 0.9; line-height: 1.6; }
        .badge {
            display: inline-block; margin-top: 30px; padding: 8px 24px;
            background: rgba(255,255,255,0.2); border-radius: 20px;
            font-size: 0.9em; backdrop-filter: blur(10px);
        }
        .version {
            position: fixed; bottom: 20px; right: 20px;
            font-size: 0.8em; opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Hello, CI/CD!</h1>
        <p>这是我第一次体验 CI/CD 自动部署！</p>
        <p>欢迎来到软件交付课程实践项目。</p>
        <div class="badge">版本：v1.0.1</div>
    </div>
    <div class="version">Powered by GitHub Actions</div>
</body>
</html>
